name: Shop Alert Bot

on:
  schedule:
    # 30분마다 실행 (UTC 기준)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # 수동으로 실행하는 버튼도 생겨요 (테스트할 때 유용!)

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # seen.json 업데이트를 위해 필요

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 상품 체크 실행
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python checker.py

      - name: seen.json 변경사항 저장
        run: |
          git config --global user.name "ShopAlertBot"
          git config --global user.email "bot@example.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Update seen.json [skip ci]"
          git push
